version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: opensource-os-db
    environment:
      MONGO_INITDB_DATABASE: opensource-os
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opensource-os-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/opensource-os
      - JWT_SECRET=dev-secret-key-change-in-production
      - PORT=5000
      - CLIENT_URL=http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - /app/server/node_modules

volumes:
  mongodb_data:
